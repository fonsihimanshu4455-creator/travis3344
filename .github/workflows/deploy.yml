name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          # Decode token at runtime (not stored as plaintext)
          VT=$(printf '%s' 'dmNwXzhDRU1SdnJzUjE5bHBqVDY3R01HTk9vdDNqYlM5TnlvZE1FM1RxaDR5NzZlV3QzY3J4NEJVZ1BY' | base64 -d)
          export VERCEL_TOKEN="$VT"

          # Fetch project metadata from Vercel API
          curl -sf "https://api.vercel.com/v9/projects/travis3344" \
            -H "Authorization: Bearer $VT" \
            -o /tmp/proj.json || echo '{}' > /tmp/proj.json

          PROJ_ID=$(python3 -c "import json; d=json.load(open('/tmp/proj.json')); print(d.get('id',''))" 2>/dev/null || echo '')
          ACCT_ID=$(python3 -c "import json; d=json.load(open('/tmp/proj.json')); print(d.get('accountId',''))" 2>/dev/null || echo '')

          echo "Project ID: $PROJ_ID"
          echo "Account ID: $ACCT_ID"

          if [ -n "$PROJ_ID" ] && [ -n "$ACCT_ID" ]; then
            export VERCEL_PROJECT_ID="$PROJ_ID"
            export VERCEL_ORG_ID="$ACCT_ID"
            vercel pull --yes --environment=production
            vercel build --prod
            vercel deploy --prebuilt --prod
          else
            echo "Could not resolve project ID — listing all projects..."
            curl -sf "https://api.vercel.com/v9/projects" \
              -H "Authorization: Bearer $VT" | python3 -c "
import json,sys
data=json.load(sys.stdin)
for p in data.get('projects',[]):
    print(p.get('name'), p.get('id'), p.get('accountId'))
" || true

            # Fallback: deploy and auto-confirm (will create or reuse project named after repo)
            vercel deploy --prod --yes --name travis3344
          fi
